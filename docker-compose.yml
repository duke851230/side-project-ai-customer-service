services:
  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - ORDER_API_BASE_URL=http://mock-api:9000
      - REDIS_URL=redis://redis:6379/0
      - SESSION_HISTORY_TURN_LIMIT=4
      - SESSION_TTL_SEC=7200
    ports:
      - "8000:8000"
    depends_on:
      - mock-api
      - redis

  mock-api:
    build:
      context: .
      dockerfile: mock_server/Dockerfile
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: uvicorn mock_server.main:app --host 0.0.0.0 --port 9000 --reload
    ports:
      - "9000:9000"

  ollama:
    image: ollama/ollama:0.5.7
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"

  web:
    image: node:20-alpine
    working_dir: /workspace/web
    volumes:
      - ./:/workspace
      - web_node_modules:/workspace/web/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    depends_on:
      - app

volumes:
  ollama:
  web_node_modules:
