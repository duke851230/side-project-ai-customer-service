version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - ORDER_API_BASE_URL=http://mock-api:9000
    ports:
      - "8000:8000"
    depends_on:
      - mock-api

  mock-api:
    build:
      context: .
      dockerfile: mock_server/Dockerfile
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: uvicorn mock_server.main:app --host 0.0.0.0 --port 9000 --reload
    ports:
      - "9000:9000"

  ollama:
    image: ollama/ollama:0.5.7
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

volumes:
  ollama:
